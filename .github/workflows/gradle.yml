name: Java CI with Gradle

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "build/libs/loader-raw.jar,build/libs/client-raw.jar"
        body: "Automated build of Shoreline-V2"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
        name: ${{ github.ref_name == 'main' && 'Latest Build' || github.ref_name }}
        prerelease: ${{ github.ref_name == 'main' }}
        allowUpdates: true
        removeArtifacts: true
        makeLatest: ${{ github.ref_name != 'main' }}
